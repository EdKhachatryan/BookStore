<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bookGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EC1E4"/>
      <stop offset="100%" stop-color="#5CB85C"/>
    </linearGradient>

    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E6E9EE"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="#FFFFFF"/>

  <g filter="url(#softShadow)">
    <!-- Left page -->
    <path d="M120 160
             Q200 130 256 190
             Q210 170 120 200
             Z"
          fill="url(#pageGradient)"/>

    <!-- Right page -->
    <path d="M392 160
             Q312 130 256 190
             Q302 170 392 200
             Z"
          fill="url(#pageGradient)"/>

    <!-- Outer book frame -->
    <path d="M120 150
             Q200 120 256 180
             Q312 120 392 150
             L392 340
             Q312 320 256 360
             Q200 320 120 340
             Z"
          fill="none"
          stroke="url(#bookGradient)"
          stroke-width="18"
          stroke-linejoin="round"/>
  </g>

</svg>
