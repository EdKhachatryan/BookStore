<mat-toolbar class="mxs-topbar">
  <div class="mxs-container mxs-topbar-inner">
    <a class="mxs-brand" [routerLink]="'/'">
      <mat-icon class="mxs-brand-icon" aria-hidden="true">auto_stories</mat-icon>
      <span class="mxs-brand-title">{{ 'app.title' | translate }}</span>
    </a>

    <div class="mxs-topbar-actions">
      <a mat-button class="mxs-topbar-link" [routerLink]="'list'"> {{ 'nav.books' | translate }} </a>

      <!-- LOGIN BUTTON -->
      <button mat-flat-button class="mxs-login-btn" type="button" *ngIf="!authStore.isLoggedIn()" (click)="openLogin()">
        <mat-icon>login</mat-icon>
        <span>{{ 'nav.login' | translate }}</span>
      </button>

      <!-- USER CHIP -->
      <div *ngIf="authStore.isLoggedIn()" class="mxs-user-chip">
        <mat-icon class="mxs-user-icon">account_circle</mat-icon>

        <div class="mxs-user-info">
          <span class="mxs-user-name"> {{ authStore.user()?.displayName }} </span>
          <span class="mxs-user-username"> {{ authStore.user()?.username }} </span>
        </div>

        <button mat-icon-button class="mxs-logout-btn" type="button" (click)="logout()" [attr.aria-label]="'Logout'">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </div>
</mat-toolbar>
