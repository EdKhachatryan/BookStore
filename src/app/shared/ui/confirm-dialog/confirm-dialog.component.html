<h2 mat-dialog-title>{{ vm.titleKey | translate }}</h2>

<mat-dialog-content> {{ vm.messageKey | translate: vm.messageParams }} </mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" class="confirm-dialog-cancel" (click)="cancel()">
    {{ vm.cancelKey | translate }}
  </button>

  <button
    mat-flat-button
    type="button"
    class="confirm-dialog-confirm"
    [color]="vm.confirmIsDestructive ? 'warn' : 'primary'"
    (click)="confirm()"
  >
    {{ vm.confirmKey | translate }}
  </button>
</mat-dialog-actions>
