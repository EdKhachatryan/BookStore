<h2 mat-dialog-title>{{ vm.titleKey | translate }}</h2>

<div mat-dialog-content>{{ vm.messageKey | translate: vm.messageParams }}</div>

<div mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">{{ vm.cancelKey | translate }}</button>

  <button mat-flat-button type="button" (click)="confirm()">{{ vm.confirmKey | translate }}</button>
</div>
