<h2 mat-dialog-title class="login-title">{{ 'auth.login.title' | translate }}</h2>

<div class="login-subtitle">{{ 'auth.login.subtitle' | translate }}</div>

<form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content class="login-content">
    <mat-form-field appearance="outline" class="login-field">
      <mat-label>{{ 'auth.login.username' | translate }}</mat-label>
      <input matInput formControlName="username" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="login-field">
      <mat-label>{{ 'auth.login.password' | translate }}</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="current-password" />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="login-actions">
    <button mat-button type="button" (click)="cancel()">{{ 'common.cancel' | translate }}</button>

    <button mat-flat-button type="submit" [disabled]="form.invalid" class="login-submit">
      {{ 'auth.login.submit' | translate }}
    </button>
  </mat-dialog-actions>
</form>
