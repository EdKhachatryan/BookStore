<section class="overview-header">
  <div class="overview-header-text">
    <h1 class="overview-title">{{ 'books.title' | translate }}</h1>
    <p class="overview-subtitle">{{ 'books.subtitle' | translate }}</p>
  </div>
</section>

<section class="overview-grid">
  <mxs-book-card
    *ngFor="let b of visibleBooks(); trackBy: trackById"
    [book]="b"
    [imageUrl]="imageForBook(b)"
    (cardClick)="openDetails($event)"
  />
  <div #sentinel class="overview-sentinel"></div>
</section>
